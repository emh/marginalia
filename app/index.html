<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fffff8">
  <meta name="application-name" content="Marginalia">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Marginalia">
  <title>Marginalia</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./version.js"></script>
  <script src="./config.js"></script>
  <script type="module" src="./main.js"></script>
</head>
<body>
  <main id="library">
    <header>
      <div class="title-row">
        <h1>marginalia</h1>
        <div class="title-actions">
          <span class="sync-dot" id="sync-dot" aria-label="not synced" title="not synced"></span>
          <button class="nav-link" id="link-library-btn" type="button">link</button>
        </div>
      </div>
      <p id="stats"></p>
      <div class="reading-progress"><div class="reading-progress-fill" id="progress-fill"></div></div>
    </header>

    <div class="input-wrap">
      <input type="text" id="main-input" placeholder="paste url or search articles..." autocomplete="off" spellcheck="false">
      <div class="input-progress" id="input-progress"></div>
      <div id="input-status"></div>
    </div>

    <nav id="categories" aria-label="Article categories"></nav>
    <div class="toolbar">
      <button class="sort-control" id="sort-btn" type="button"></button>
    </div>
    <div id="article-list"></div>
    <div class="empty-state" id="empty-state">No articles found.</div>
  </main>

  <div class="overlay" id="detail-overlay">
    <div class="overlay-content" id="detail-content"></div>
  </div>

  <div class="setup-screen" id="setup-screen">
    <div class="setup-content" id="setup-content"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script async data-id="101502386" src="//static.getclicky.com/js"></script>
</body>
</html>
